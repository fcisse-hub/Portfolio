<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Redirection mobile -->
<script>
  (function() {
    var isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent)
      || (navigator.maxTouchPoints > 1 && window.innerWidth < 1024);
    if (isMobile) {
      window.location.replace("https://fcisse-hub.github.io/Portfolio/portfolio-mobile.html");
    }
  })();
</script>
  <title>Sabine F. Cissé - Portfolio</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow-x: hidden; background-color: #000; color: #fff; scroll-behavior: smooth; }
    body { overflow-y: auto; height: auto; }
    .font-title { font-family: 'Cinzel', serif; font-weight: 400; }
    .font-title-bold { font-family: 'Cinzel', serif; font-weight: 700; }
    .font-body { font-family: 'Cormorant Garamond', serif; font-weight: 400; line-height: 1.7; }
    .font-elegant { font-family: 'EB Garamond', serif; line-height: 1.7; }

    /* ─── LANGUAGE TOGGLE ─── */
    #lang-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(10, 8, 5, 0.88);
      border: 1.5px solid #d4af37;
      overflow: hidden;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    #lang-toggle button {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      padding: 0.55rem 1rem;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
      color: #a88734;
    }

    #lang-toggle button.active {
      background: #d4af37;
      color: #0a0805;
    }

    #lang-toggle .lang-sep {
      width: 1px;
      height: 1.6rem;
      background: rgba(212, 175, 55, 0.35);
      flex-shrink: 0;
    }

    #lang-toggle button:hover:not(.active) {
      color: #f4d03f;
      background: rgba(212, 175, 55, 0.1);
    }

    /* ─── GRAIN ─── */
    .grain-texture {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='2' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
      pointer-events: none; opacity: 0.6; z-index: 1; mix-blend-mode: overlay;
    }

    .page-section {
      min-height: 100vh; width: 100%; position: relative;
      background-size: cover; background-position: center;
      background-repeat: no-repeat; background-attachment: fixed;
      display: flex; align-items: center; justify-content: center;
      padding: 4rem 2rem;
    }

    .vignette-overlay { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.6) 80%); z-index: 1; }
    #page-identity .vignette-overlay, #page-parcours .vignette-overlay, #page-contact .vignette-overlay {
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 20%, rgba(0,0,0,0.75) 80%);
    }

    .content-overlay { position: relative; z-index: 2; width: 100%; max-width: 1400px; margin: 0 auto; }

    /* ─── IDENTITY ─── */
    #page-identity { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/identity.png?raw=true'); }
    .identity-content { text-align: center; max-width: 1200px; margin: 0 auto; }
    .identity-title { font-size: clamp(3rem, 8vw, 6rem); margin-bottom: 2rem; letter-spacing: 0.02em; line-height: 1.2; text-shadow: 0 2px 12px rgba(0,0,0,0.9); }
    .identity-subtitle { font-size: clamp(1rem, 2vw, 1.5rem); color: #d4af37; margin-bottom: 3rem; letter-spacing: 0.15em; text-transform: uppercase; text-shadow: 0 2px 12px rgba(0,0,0,0.9); }
    .identity-tagline { font-size: clamp(1.25rem, 2.5vw, 2rem); font-style: italic; color: #e8d5b7; margin-bottom: 3rem; max-width: 900px; margin-left: auto; margin-right: auto; text-shadow: 0 2px 12px rgba(0,0,0,0.9); }
    .identity-description { font-size: clamp(1.1rem, 1.8vw, 1.4rem); color: #dbc09a; max-width: 850px; margin: 0 auto 4rem; line-height: 1.8; text-shadow: 0 2px 12px rgba(0,0,0,0.9); }

    .scroll-indicator { display: inline-flex; flex-direction: column; align-items: center; gap: 0.5rem; color: #d4af37; font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase; animation: bounce 2s infinite; cursor: pointer; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
    .scroll-indicator svg { width: 24px; height: 24px; }

    /* ─── PARCOURS ─── */
    #page-parcours { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/parcours.png?raw=true'); }
    .parcours-container { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
    .parcours-left { max-width: 650px; }
    .parcours-badge { display: inline-block; padding: 0.5rem 1.5rem; border: 2px solid #d4af37; border-radius: 30px; font-size: 0.9rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.9); }
    .parcours-title { font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 2rem; line-height: 1.2; text-shadow: 0 2px 12px rgba(0,0,0,0.9); }
    .parcours-intro { font-size: clamp(1.1rem, 1.6vw, 1.3rem); color: #dbc09a; margin-bottom: 2rem; line-height: 1.8; text-shadow: 0 2px 10px rgba(0,0,0,0.9); }
    .parcours-highlight { color: #d4af37; font-weight: 600; }
    .parcours-list { list-style: none; margin-top: 2rem; }
    .parcours-list li { margin-bottom: 1.5rem; padding-left: 1.5rem; position: relative; font-size: clamp(1rem, 1.4vw, 1.2rem); color: #e8d5b7; line-height: 1.7; text-shadow: 0 2px 10px rgba(0,0,0,0.9); }
    .parcours-list li::before { content: "•"; position: absolute; left: 0; color: #d4af37; font-size: 1.5rem; }
    .parcours-list strong { color: #d4af37; font-weight: 600; }
    .parcours-right { display: flex; flex-direction: column; gap: 2rem; }

    .testimonial-card { background: rgba(0,0,0,0.7); border: 1px solid rgba(212,175,55,0.3); border-left: 3px solid #d4af37; padding: 2rem; position: relative; }
    .quote-icon { font-size: 4rem; color: #d4af37; opacity: 0.3; line-height: 0; margin-bottom: 1rem; font-family: Georgia, serif; }
    .testimonial-text { font-size: clamp(1rem, 1.4vw, 1.2rem); font-style: italic; color: #dbc09a; margin-bottom: 1rem; line-height: 1.7; }
    .testimonial-author { font-size: 0.95rem; color: #d4af37; font-weight: 600; }
    .testimonial-role { font-size: 0.85rem; color: #a88734; }

    /* ─── PROJETS ─── */
    #page-projets { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/projets.png?raw=true'); background-position: center right; }
    .projets-header { text-align: center; margin-bottom: 4rem; }
    .projets-title { font-size: clamp(2.5rem, 5vw, 4.5rem); margin-bottom: 2rem; line-height: 1.2; }
    .projets-intro { font-size: clamp(1.1rem, 1.6vw, 1.3rem); color: #dbc09a; max-width: 800px; margin: 0 auto; line-height: 1.8; }
    .projets-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2.5rem; margin-top: 3rem; }

    .project-card { background: rgba(0,0,0,0.8); border: 2px solid rgba(212,175,55,0.3); padding: 2.5rem; transition: all 0.4s ease; position: relative; overflow: hidden; }
    .project-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.1), transparent); transition: left 0.6s ease; }
    .project-card:hover::before { left: 100%; }
    .project-card:hover { border-color: #d4af37; transform: translateY(-8px); box-shadow: 0 15px 40px rgba(0,0,0,0.6); }

    .project-category { display: inline-block; background: rgba(212,175,55,0.2); border: 1px solid #d4af37; padding: 0.4rem 1rem; font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 1.5rem; color: #d4af37; font-weight: 600; }
    .project-title { font-size: 1.8rem; margin-bottom: 1rem; color: #fff; line-height: 1.3; position: relative; z-index: 1; }
    .project-subtitle { font-size: 1.1rem; color: #d4af37; font-style: italic; margin-bottom: 1rem; position: relative; z-index: 1; }
    .project-description { font-size: 1.05rem; color: #dbc09a; line-height: 1.7; margin-bottom: 1.5rem; position: relative; z-index: 1; }
    .project-features { list-style: none; margin-bottom: 1.5rem; position: relative; z-index: 1; }
    .project-features li { font-size: 0.95rem; color: #e8d5b7; padding-left: 1.5rem; position: relative; margin-bottom: 0.5rem; }
    .project-features li::before { content: "→"; position: absolute; left: 0; color: #d4af37; }
    .project-link { display: inline-block; color: #d4af37; text-decoration: none; font-size: 0.95rem; border-bottom: 1px solid transparent; transition: all 0.3s ease; position: relative; z-index: 1; font-weight: 600; letter-spacing: 0.05em; }
    .project-link:hover { border-bottom-color: #d4af37; color: #f4d03f; }
    .project-type-label { font-size: 0.85rem; color: #a88734; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 1rem; font-weight: 600; }

    /* ─── FORMATION ─── */
    #page-formation { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/formation.png?raw=true'); }
    .formation-header { text-align: center; margin-bottom: 4rem; }
    .formation-title { font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 2rem; line-height: 1.2; }
    .formation-intro { font-size: clamp(1.1rem, 1.6vw, 1.3rem); color: #dbc09a; max-width: 900px; margin: 0 auto; line-height: 1.8; }
    .formation-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; margin-top: 3rem; }
    .formation-card { background: rgba(0,0,0,0.75); border: 1px solid rgba(212,175,55,0.3); padding: 2.5rem; display: flex; flex-direction: column; transition: all 0.3s ease; }
    .formation-card:hover { border-color: #d4af37; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .formation-icon { width: 60px; height: 60px; background: rgba(212,175,55,0.2); border: 2px solid #d4af37; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; font-size: 1.5rem; }
    .formation-card-title { font-size: 1.4rem; margin-bottom: 1rem; color: #fff; line-height: 1.3; }
    .formation-degree { color: #d4af37; font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
    .formation-details { font-size: 0.95rem; color: #a88734; margin-bottom: 1rem; }
    .formation-description { font-size: 1rem; color: #dbc09a; line-height: 1.6; margin-top: auto; }

    /* ─── CONTACT ─── */
    #page-contact { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/contact.png?raw=true'); }
    .contact-content { text-align: center; max-width: 1100px; margin: 0 auto; padding-bottom: 5rem; }
    .contact-title { font-size: clamp(3rem, 7vw, 5rem); margin-bottom: 2rem; line-height: 1.2; text-shadow: 0 2px 12px rgba(0,0,0,0.9); }
    .contact-description { font-size: clamp(1.1rem, 1.8vw, 1.4rem); color: #dbc09a; margin-bottom: 3rem; line-height: 1.8; max-width: 900px; margin-left: auto; margin-right: auto; text-shadow: 0 2px 10px rgba(0,0,0,0.9); }
    .contact-tagline { font-size: clamp(1rem, 1.5vw, 1.2rem); font-style: italic; color: #d4af37; margin-bottom: 3rem; text-shadow: 0 2px 10px rgba(0,0,0,0.9); }
    .contact-cta-box { background: rgba(61,40,23,0.85); border: 2px solid #d4af37; padding: 3rem 4rem; display: inline-block; cursor: pointer; transition: all 0.4s ease; position: relative; overflow: hidden; }
    .contact-cta-box::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.2), transparent); transition: left 0.6s ease; }
    .contact-cta-box:hover::before { left: 100%; }
    .contact-cta-box:hover { border-color: #f4d03f; box-shadow: 0 0 40px rgba(212,175,55,0.4); transform: translateY(-5px); }
    .contact-cta-text { font-size: clamp(2rem, 4vw, 3.5rem); margin-bottom: 0.5rem; position: relative; z-index: 1; }
    .contact-cta-subtitle { font-size: clamp(0.9rem, 1.2vw, 1rem); color: #d4af37; letter-spacing: 0.15em; text-transform: uppercase; position: relative; z-index: 1; }
    .contact-email { margin-top: 2.5rem; font-size: clamp(1rem, 1.3vw, 1.1rem); color: #a88734; }
    .contact-email a { color: #d4af37; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.3s ease; }
    .contact-email a:hover { border-bottom-color: #d4af37; }

    .page-footer { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; text-align: center; padding: 1.5rem 2rem; background: rgba(0,0,0,0.8); border-top: 1px solid rgba(212,175,55,0.3); }
    .footer-text { font-size: 0.9rem; color: #a88734; letter-spacing: 0.05em; }
    .footer-separator { color: #d4af37; margin: 0 0.5rem; }

    /* ─── MODAL ─── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; animation: fadeIn 0.4s ease; padding: 2rem; }
    .modal-overlay.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content { background: linear-gradient(135deg, rgba(26,20,16,0.98) 0%, rgba(61,40,23,0.98) 100%); border: 2px solid rgba(212,175,55,0.5); padding: 3rem; max-width: 650px; width: 100%; position: relative; animation: slideUp 0.5s ease; max-height: 90vh; overflow-y: auto; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
    .close-btn { position: absolute; top: 1.5rem; right: 1.5rem; background: transparent; border: none; color: #d4af37; cursor: pointer; font-size: 2rem; line-height: 1; padding: 0.5rem; transition: all 0.3s ease; }
    .close-btn:hover { color: #f4d03f; transform: rotate(90deg); }
    .modal-title { font-size: 2.5rem; text-align: center; margin-bottom: 1rem; color: #d4af37; }
    .modal-subtitle { text-align: center; font-size: 1.1rem; color: #dbc09a; margin-bottom: 2.5rem; font-style: italic; }
    .form-group { margin-bottom: 1.5rem; }
    .form-label { display: block; font-size: 0.9rem; color: #d4af37; margin-bottom: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }
    .form-input, .form-textarea { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(212,175,55,0.4); color: #e8d5b7; padding: 1rem; font-family: 'EB Garamond', serif; font-size: 1.1rem; transition: all 0.3s ease; }
    .form-input:focus, .form-textarea:focus { outline: none; border-color: #d4af37; box-shadow: 0 0 20px rgba(212,175,55,0.3); background: rgba(0,0,0,0.7); }
    .form-textarea { resize: vertical; min-height: 150px; line-height: 1.6; }
    .btn-submit { width: 100%; background: linear-gradient(135deg, #3d2817 0%, #1a1410 100%); border: 2px solid #d4af37; color: #d4af37; padding: 1.2rem 3rem; font-family: 'Cinzel', serif; letter-spacing: 0.15em; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.4s ease; margin-top: 1.5rem; text-transform: uppercase; }
    .btn-submit:hover:not(:disabled) { border-color: #f4d03f; color: #f4d03f; box-shadow: 0 0 30px rgba(212,175,55,0.5); transform: translateY(-2px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-note { text-align: center; font-size: 0.9rem; color: #a88734; margin-top: 1rem; font-style: italic; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1024px) {
      .parcours-container { grid-template-columns: 1fr; gap: 3rem; }
      .formation-grid { grid-template-columns: 1fr; }
      .projets-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .page-section { padding: 3rem 1.5rem; }
      #lang-toggle { top: 1rem; right: 1rem; }
    }
    #page-identity, #page-parcours, #page-projets, #page-formation, #page-contact {
      background-attachment: scroll;
      background-size: cover;
      background-position: center;
    }
    @supports (-webkit-overflow-scrolling: touch) {
      #page-identity, #page-parcours, #page-projets, #page-formation, #page-contact {
        background-attachment: scroll !important;
      }
    }

    /* ═══════════════════════════════════════════
       ACCESSIBLE MODE  (body.accessible)
       Palette: warm off-white · dark brown text
       WCAG AA contrast ratios throughout
    ═══════════════════════════════════════════ */
    body.accessible {
      background-color: #fdf9f2;
      color: #2c1f14;
      font-size: 110%;
    }

    /* Backgrounds → light versions */
    body.accessible #page-identity  { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/identity-light.png?raw=true'); }
    body.accessible #page-parcours  { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/parcours-light.png?raw=true'); }
    body.accessible #page-projets   { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/projects-light.png?raw=true'); }
    body.accessible #page-formation { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/formation-light.png?raw=true'); }
    body.accessible #page-contact   { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/contact-light.png?raw=true'); }

    /* Remove grain */
    body.accessible .grain-texture { display: none; }

    /* Vignettes → cream wash to mute photo and contrast dark text */
    body.accessible .vignette-overlay,
    body.accessible #page-identity .vignette-overlay,
    body.accessible #page-parcours .vignette-overlay,
    body.accessible #page-contact .vignette-overlay {
      background: rgba(253,249,242,0.54);
    }

    /* Global text colours — near-black for maximum contrast on cream wash */
    body.accessible .identity-subtitle,
    body.accessible .scroll-indicator,
    body.accessible .parcours-badge,
    body.accessible .parcours-highlight,
    body.accessible .parcours-list strong,
    body.accessible .testimonial-author,
    body.accessible .project-category,
    body.accessible .project-subtitle,
    body.accessible .project-link,
    body.accessible .project-features li::before,
    body.accessible .formation-degree,
    body.accessible .contact-tagline,
    body.accessible .contact-cta-subtitle,
    body.accessible .footer-separator { color: #5c3d0a; }

    body.accessible .identity-tagline,
    body.accessible .identity-description,
    body.accessible .parcours-intro,
    body.accessible .parcours-list li,
    body.accessible .testimonial-text,
    body.accessible .testimonial-role,
    body.accessible .projets-intro,
    body.accessible .project-description,
    body.accessible .project-features li,
    body.accessible .formation-intro,
    body.accessible .formation-details,
    body.accessible .formation-description,
    body.accessible .contact-description,
    body.accessible .contact-email,
    body.accessible .footer-text { color: #1a1008; font-weight: 600; }

    body.accessible .project-title,
    body.accessible .formation-card-title { color: #0a0805; }

    body.accessible .contact-email a { color: #5c3d0a; }

    /* Bold all overlay text for maximum legibility on photo backgrounds */
    body.accessible .identity-title,
    body.accessible .identity-subtitle,
    body.accessible .identity-tagline,
    body.accessible .identity-description,
    body.accessible .parcours-title,
    body.accessible .parcours-intro,
    body.accessible .parcours-list li,
    body.accessible .projets-title,
    body.accessible .projets-intro,
    body.accessible .formation-title,
    body.accessible .formation-intro,
    body.accessible .contact-title,
    body.accessible .contact-description,
    body.accessible .contact-tagline { font-weight: 700; }

    /* Text shadows: cream wash vignette handles contrast; subtle shadow for extra legibility */
    body.accessible .identity-title,
    body.accessible .identity-subtitle,
    body.accessible .identity-tagline,
    body.accessible .identity-description,
    body.accessible .scroll-indicator,
    body.accessible .parcours-title,
    body.accessible .parcours-badge,
    body.accessible .parcours-intro,
    body.accessible .parcours-list li,
    body.accessible .projets-title,
    body.accessible .projets-intro,
    body.accessible .formation-title,
    body.accessible .formation-intro,
    body.accessible .contact-title,
    body.accessible .contact-description,
    body.accessible .contact-tagline {
      text-shadow: 0 1px 4px rgba(253,249,242,0.95), 0 2px 10px rgba(253,249,242,0.80);
    }
    body.accessible .project-title,
    body.accessible .project-description,
    body.accessible .project-features li,
    body.accessible .testimonial-text,
    body.accessible .formation-card-title,
    body.accessible .formation-description { text-shadow: none; }

    /* Cards → light, warm white */
    body.accessible .project-card {
      background: rgba(253, 249, 242, 0.93);
      border-color: rgba(122, 84, 21, 0.35);
      box-shadow: 0 2px 16px rgba(44,31,20,0.10);
    }
    body.accessible .project-card:hover {
      border-color: #7a5415;
      box-shadow: 0 12px 32px rgba(44,31,20,0.18);
    }
    body.accessible .project-category {
      background: rgba(122,84,21,0.12);

  let currentLang = 'fr';

  function setLang(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;

    // Toggle button states
    document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-fr').setAttribute('aria-pressed', lang === 'fr');
    document.getElementById('btn-en').setAttribute('aria-pressed', lang === 'en');

    const t = i18n[lang];

    // Text content
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) {
        // Use innerHTML for entries that may contain HTML tags
        el.innerHTML = t[key];
      }
    });

    // Placeholders
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      if (t[key] !== undefined) {
        el.placeholder = t[key];
      }
    });

    // Update page title
    document.title = lang === 'fr'
      ? 'Sabine F. Cissé – Portfolio'
      : 'Sabine F. Cissé – Portfolio';
  }

  // Initialise French on load
  document.addEventListener('DOMContentLoaded', () => {
    setLang('fr');
    // Restore accessible mode preference
    if (localStorage.getItem('portfolioA11y') === '1') {
      document.body.classList.add('accessible');
      document.getElementById('btn-a11y').classList.add('active');
      document.getElementById('btn-a11y').setAttribute('aria-pressed', 'true');
    }
  });

  function toggleAccessible() {
    const isOn = document.body.classList.toggle('accessible');
    const btn = document.getElementById('btn-a11y');
    btn.classList.toggle('active', isOn);
    btn.setAttribute('aria-pressed', isOn ? 'true' : 'false');
    try { localStorage.setItem('portfolioA11y', isOn ? '1' : '0'); } catch(e) {}
  }

  // ─── CONTACT FORM ───
  function openContactForm() {
    document.getElementById('contactModal').classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeContactForm() {
    document.getElementById('contactModal').classList.remove('active');
    document.body.style.overflow = 'auto';
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('contactModal').classList.contains('active')) closeContactForm();
  });
  document.getElementById('contactModal').addEventListener('click', e => {
    if (e.target.id === 'contactModal') closeContactForm();
  });
 function handleSubmit(event) {
    event.preventDefault();
    const btn = document.getElementById('submitBtn');
    const form = event.target;
    btn.disabled = true;
    btn.textContent = currentLang === 'fr' ? 'ENVOI EN COURS...' : 'SENDING...';
    fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    })
    .then(response => {
      if (response.ok) {
        btn.textContent = currentLang === 'fr' ? '✓ MESSAGE ENVOYÉ' : '✓ MESSAGE SENT';
        form.reset();
        setTimeout(() => {
          closeContactForm();
          btn.disabled = false;
          btn.textContent = i18n[currentLang].form_send;
        }, 2000);
      } else {
        throw new Error('Erreur réseau');
      }
    })
    .catch(() => {
      btn.disabled = false;
      btn.textContent = currentLang === 'fr' ? '✗ ERREUR — RÉESSAYER' : '✗ ERROR — RETRY';
      setTimeout(() => {
        btn.textContent = i18n[currentLang].form_send;
      }, 3000);
    });
  }

  // Smooth scroll
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', e => {
      e.preventDefault();
      const t = document.querySelector(anchor.getAttribute('href'));
      if (t) t.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
  </script>
