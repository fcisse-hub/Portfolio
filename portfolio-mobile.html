<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sabine F. Cissé - Portfolio</title>

  <!-- Redirect to desktop if not mobile -->
  <script>
    (function() {
      var isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent)
        || (navigator.maxTouchPoints > 1 && window.innerWidth < 1024);
      if (!isMobile && window.innerWidth > 900) {
        window.location.replace("https://fcisse-hub.github.io/Portfolio/");
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,500&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Cormorant Garamond', serif;
      background: #0a0805;
      color: #e8d5b7;
      overflow-x: hidden;
    }

    /* ── TYPOGRAPHY CLASSES ── */
    .font-title     { font-family: 'Cinzel', serif; font-weight: 400; }
    .font-title-bold{ font-family: 'Cinzel', serif; }
    .font-body      { font-family: 'Cormorant Garamond', serif; line-height: 1.7; }
    .font-elegant   { font-family: 'EB Garamond', serif; line-height: 1.7; }

    /* ── LANGUAGE TOGGLE ── */
    #lang-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 9999;
      display: flex;
      align-items: center;
      background: rgba(10, 8, 5, 0.88);
      border: 1.5px solid #d4af37;
      overflow: hidden;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #lang-toggle button {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      padding: 0.5rem 0.85rem;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
      color: #a88734;
    }
    #lang-toggle button.active { background: #d4af37; color: #0a0805; }
    #lang-toggle .lang-sep {
      width: 1px; height: 1.4rem;
      background: rgba(212,175,55,0.35);
    }

    /* ── GRAIN ── */
    .grain-texture {
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='2' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.5;
      z-index: 1;
      mix-blend-mode: overlay;
    }

    /* ── SECTIONS ── */
    .page-section {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      background-size: cover;
      background-position: center center;
      background-attachment: scroll;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5rem 1.5rem 3rem;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.78) 100%);
      z-index: 1;
    }
    .vignette-strong {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.65) 0%,
        rgba(0,0,0,0.45) 40%,
        rgba(0,0,0,0.55) 70%,
        rgba(0,0,0,0.80) 100%
      );
      z-index: 1;
    }

    .content { position: relative; z-index: 2; width: 100%; max-width: 480px; margin: 0 auto; }

    /* ── SECTION BACKGROUNDS ── */
    #page-identity  { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/identity-mobile.png?raw=true'); }
    #page-parcours  { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/parcours-mobile.png?raw=true'); }
    #page-projets   { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/projects-mobile.png?raw=true'); }
    #page-formation { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/formation-mobile.png?raw=true'); }
    #page-contact   { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/contact-mobile.png?raw=true'); }

    /* ─────────────────────────────────────────
       IDENTITY
    ───────────────────────────────────────── */
    #page-identity { align-items: flex-end; padding-bottom: 4rem; }

    .identity-inner {
      text-align: center;
      padding: 2rem 1.5rem;
      background: rgba(0,0,0,0.45);
      border-top: 1px solid rgba(212,175,55,0.35);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .identity-name {
      font-size: clamp(2rem, 9vw, 2.8rem);
      letter-spacing: 0.04em;
      line-height: 1.15;
      margin-bottom: 0.75rem;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
    }

    .identity-subtitle {
      font-size: clamp(0.65rem, 2.8vw, 0.85rem);
      color: #d4af37;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
      line-height: 1.5;
    }

    .identity-tagline {
      font-size: clamp(1.05rem, 4vw, 1.3rem);
      font-style: italic;
      color: #dbc09a;
      margin-bottom: 1.25rem;
      line-height: 1.6;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
    }

    .identity-desc {
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      color: #c9b48a;
      line-height: 1.75;
      margin-bottom: 1.5rem;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }

    .scroll-cta {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: #d4af37;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      animation: bounce 2.2s ease-in-out infinite;
      cursor: pointer;
      font-family: 'Cinzel', serif;
    }
    .scroll-cta svg { width: 20px; height: 20px; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(8px); }
    }

    /* ─────────────────────────────────────────
       PARCOURS
    ───────────────────────────────────────── */
    #page-parcours { align-items: flex-start; padding-top: 5.5rem; }

    .section-badge {
      display: inline-block;
      padding: 0.4rem 1rem;
      border: 1.5px solid #d4af37;
      border-radius: 30px;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #d4af37;
      margin-bottom: 1.25rem;
      font-family: 'Cinzel', serif;
    }

    .section-title {
      font-size: clamp(1.6rem, 7vw, 2.2rem);
      line-height: 1.25;
      margin-bottom: 1.25rem;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
    }

    .section-text {
      font-size: clamp(0.95rem, 3.8vw, 1.1rem);
      color: #d4c5a9;
      line-height: 1.75;
      margin-bottom: 1rem;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }

    .parcours-highlight { color: #d4af37; }

    .parcours-list {
      list-style: none;
      margin: 1rem 0 1.5rem;
    }
    .parcours-list li {
      padding-left: 1.25rem;
      position: relative;
      font-size: clamp(0.9rem, 3.5vw, 1.05rem);
      color: #dbc09a;
      line-height: 1.7;
      margin-bottom: 0.85rem;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }
    .parcours-list li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: #d4af37;
      font-size: 1.2rem;
      line-height: 1.4;
    }
    .parcours-list strong { color: #d4af37; }

    .testimonial-card {
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(212,175,55,0.25);
      border-left: 3px solid #d4af37;
      padding: 1.25rem 1.25rem 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    .quote-icon {
      font-size: 2.8rem;
      color: #d4af37;
      opacity: 0.3;
      line-height: 0.7;
      margin-bottom: 0.75rem;
      font-family: Georgia, serif;
    }
    .testimonial-text {
      font-size: clamp(0.9rem, 3.5vw, 1.05rem);
      font-style: italic;
      color: #dbc09a;
      line-height: 1.65;
      margin-bottom: 0.6rem;
    }
    .testimonial-author {
      font-size: 0.8rem;
      color: #d4af37;
      font-family: 'Cinzel', serif;
      font-weight: 700;
    }
    .testimonial-role { font-size: 0.75rem; color: #a88734; }

    /* ─────────────────────────────────────────
       PROJETS
    ───────────────────────────────────────── */
    .projets-header { text-align: center; margin-bottom: 2rem; }

    .project-card {
      background: rgba(0,0,0,0.80);
      border: 1.5px solid rgba(212,175,55,0.3);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .project-card:last-child { margin-bottom: 0; }
    .project-card:active { border-color: #d4af37; }

    .project-category {
      display: inline-block;
      background: rgba(212,175,55,0.15);
      border: 1px solid #d4af37;
      padding: 0.3rem 0.8rem;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #d4af37;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      margin-bottom: 0.85rem;
    }
    .project-title {
      font-size: clamp(1.3rem, 5.5vw, 1.6rem);
      color: #fff;
      margin-bottom: 0.5rem;
      font-family: 'Cinzel', serif;
    }
    .project-subtitle {
      font-size: clamp(0.9rem, 3.5vw, 1.05rem);
      color: #d4af37;
      font-style: italic;
      margin-bottom: 0.75rem;
    }
    .project-desc {
      font-size: clamp(0.9rem, 3.5vw, 1.05rem);
      color: #dbc09a;
      line-height: 1.7;
      margin-bottom: 1rem;
    }
    .project-features {
      list-style: none;
      margin-bottom: 1rem;
    }
    .project-features li {
      font-size: clamp(0.85rem, 3.2vw, 1rem);
      color: #e8d5b7;
      padding-left: 1.25rem;
      position: relative;
      margin-bottom: 0.4rem;
      line-height: 1.5;
    }
    .project-features li::before { content: "→"; position: absolute; left: 0; color: #d4af37; }
    .project-link {
      display: inline-block;
      color: #d4af37;
      text-decoration: none;
      font-size: 0.9rem;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      border-bottom: 1px solid rgba(212,175,55,0.4);
      padding-bottom: 2px;
      letter-spacing: 0.05em;
    }
    .project-type-label {
      font-size: 0.8rem;
      color: #a88734;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-top: 0.75rem;
    }

    /* ─────────────────────────────────────────
       FORMATION
    ───────────────────────────────────────── */
    .formation-card {
      background: rgba(0,0,0,0.78);
      border: 1px solid rgba(212,175,55,0.3);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.3s;
    }
    .formation-card:active { border-color: #d4af37; }
    .formation-icon {
      width: 48px; height: 48px;
      background: rgba(212,175,55,0.15);
      border: 1.5px solid #d4af37;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem;
      margin-bottom: 1rem;
    }
    .formation-card-title {
      font-size: clamp(1.1rem, 4.5vw, 1.3rem);
      color: #fff;
      margin-bottom: 0.85rem;
      font-family: 'Cinzel', serif;
    }
    .formation-degree {
      color: #d4af37;
      font-size: clamp(0.85rem, 3.3vw, 1rem);
      font-family: 'Cinzel', serif;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .formation-details {
      font-size: clamp(0.8rem, 3vw, 0.92rem);
      color: #a88734;
      margin-bottom: 0.65rem;
      line-height: 1.5;
    }
    .formation-desc {
      font-size: clamp(0.88rem, 3.3vw, 1rem);
      color: #dbc09a;
      line-height: 1.65;
      padding-top: 0.5rem;
      border-top: 1px solid rgba(212,175,55,0.2);
      margin-top: 0.5rem;
    }

    /* ─────────────────────────────────────────
       CONTACT
    ───────────────────────────────────────── */
    #page-contact { align-items: center; padding-bottom: 5rem; }

    .contact-inner { text-align: center; }

    .contact-title {
      font-size: clamp(1.6rem, 7vw, 2.4rem);
      line-height: 1.2;
      margin-bottom: 1.25rem;
      text-shadow: 0 2px 14px rgba(0,0,0,0.9);
    }

    .contact-desc {
      font-size: clamp(0.95rem, 3.8vw, 1.15rem);
      color: #dbc09a;
      line-height: 1.75;
      margin-bottom: 1.25rem;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }

    .contact-tagline {
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      font-style: italic;
      color: #d4af37;
      margin-bottom: 2rem;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }

    .contact-cta-box {
      background: rgba(61,40,23,0.88);
      border: 2px solid #d4af37;
      padding: 1.75rem 1.5rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.35s ease;
      display: block;
      width: 100%;
    }
    .contact-cta-box:active {
      border-color: #f4d03f;
      box-shadow: 0 0 30px rgba(212,175,55,0.4);
    }
    .contact-cta-text {
      font-size: clamp(1.5rem, 6.5vw, 2rem);
      margin-bottom: 0.35rem;
      font-family: 'Cinzel', serif;
    }
    .contact-cta-sub {
      font-size: 0.7rem;
      color: #d4af37;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-family: 'Cinzel', serif;
    }
    .contact-email {
      margin-top: 1.5rem;
      font-size: clamp(0.85rem, 3.3vw, 1rem);
      color: #a88734;
    }
    .contact-email a {
      color: #d4af37;
      text-decoration: none;
      border-bottom: 1px solid rgba(212,175,55,0.4);
    }

    /* ─────────────────────────────────────────
       FOOTER STRIP
    ───────────────────────────────────────── */
    .page-footer {
      text-align: center;
      padding: 0.75rem 1rem;
      background: rgba(0,0,0,0.85);
      border-top: 1px solid rgba(212,175,55,0.25);
    }
    .footer-text { font-size: 0.78rem; color: #a88734; letter-spacing: 0.04em; }

    /* ─────────────────────────────────────────
       MODAL CONTACT
    ───────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }
    .modal-overlay.active { display: flex; }

    .modal-content {
      background: linear-gradient(160deg, #1a1410 0%, #3d2817 100%);
      border: 1.5px solid rgba(212,175,55,0.5);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      padding: 2rem 1.5rem 3rem;
      width: 100%;
      max-width: 480px;
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUpModal 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes slideUpModal {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .close-btn {
      position: absolute;
      top: 1rem; right: 1rem;
      background: transparent; border: none;
      color: #d4af37; cursor: pointer;
      font-size: 1.75rem; line-height: 1;
    }
    .modal-title {
      font-size: clamp(1.4rem, 6vw, 1.8rem);
      text-align: center;
      margin-bottom: 0.5rem;
      color: #d4af37;
      font-family: 'Cinzel', serif;
    }
    .modal-subtitle {
      text-align: center;
      font-size: clamp(0.9rem, 3.5vw, 1rem);
      color: #dbc09a;
      margin-bottom: 2rem;
      font-style: italic;
    }
    .form-group { margin-bottom: 1.25rem; }
    .form-label {
      display: block;
      font-size: 0.75rem;
      color: #d4af37;
      margin-bottom: 0.4rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Cinzel', serif;
      font-weight: 700;
    }
    .form-input, .form-textarea {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(212,175,55,0.4);
      color: #e8d5b7;
      padding: 0.85rem;
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      transition: border-color 0.3s;
      -webkit-appearance: none;
      border-radius: 0;
    }
    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: #d4af37;
      box-shadow: 0 0 15px rgba(212,175,55,0.25);
    }
    .form-textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #3d2817 0%, #1a1410 100%);
      border: 1.5px solid #d4af37;
      color: #d4af37;
      padding: 1rem;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.12em;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1rem;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }
    .btn-submit:active:not(:disabled) {
      border-color: #f4d03f;
      color: #f4d03f;
    }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-note { text-align: center; font-size: 0.82rem; color: #a88734; margin-top: 0.75rem; font-style: italic; }

    /* ─────────────────────────────────────────
       NAV DOTS (section indicator)
    ───────────────────────────────────────── */
    .nav-dots {
      position: fixed;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .nav-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(212,175,55,0.35);
      border: 1px solid rgba(212,175,55,0.5);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .nav-dot.active {
      background: #d4af37;
      box-shadow: 0 0 6px rgba(212,175,55,0.7);
    }

    /* ─────────────────────────────────────────
       SECTION DIVIDER
    ───────────────────────────────────────── */
    .section-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(212,175,55,0.4), transparent);
      position: relative;
      z-index: 2;
    }

    /* ═══════════════════════════════════════════
       ACCESSIBLE MODE  (body.accessible)
       Palette: warm off-white · dark brown text
       WCAG AA contrast ratios throughout
    ═══════════════════════════════════════════ */
    body.accessible {
      background-color: #fdf9f2;
      color: #1a1008;
      font-size: 108%;
    }
    /* Global bold — every text element in accessible mode */
    body.accessible *,
    body.accessible p,
    body.accessible li,
    body.accessible span,
    body.accessible a,
    body.accessible label {
      font-weight: 600;
    }
    body.accessible h1,
    body.accessible h2,
    body.accessible h3,
    body.accessible .font-title,
    body.accessible .font-title-bold,
    body.accessible .section-title,
    body.accessible .identity-name,
    body.accessible .project-title,
    body.accessible .formation-card-title,
    body.accessible .contact-title,
    body.accessible .modal-title {
      font-weight: 700;
    }

    /* Backgrounds → light mobile versions */
    body.accessible #page-identity  { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/identity-light-mobile.png?raw=true'); }
    body.accessible #page-parcours  { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/parcours-light-mobile.png?raw=true'); }
    body.accessible #page-projets   { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/projects-light-mobile.png?raw=true'); }
    body.accessible #page-formation { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/formation-light-mobile.png?raw=true'); }
    body.accessible #page-contact   { background-image: url('https://github.com/fcisse-hub/Portfolio/blob/main/contact-light-mobile.png?raw=true'); }

    /* Lock identity section to exact viewport height — prevents image rescaling on lang toggle */
    body.accessible #page-identity {
      height: 100svh;
      min-height: 0;
      overflow: hidden;
    }

    /* Remove grain */
    body.accessible .grain-texture { display: none; }

    /* Vignettes → strong cream wash to mute photo and contrast dark text */
    body.accessible .vignette {
      background: rgba(253, 249, 242, 0.52);
    }
    body.accessible .vignette-strong {

  let currentLang = 'fr';

  function setLang(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-fr').setAttribute('aria-pressed', lang === 'fr');
    document.getElementById('btn-en').setAttribute('aria-pressed', lang === 'en');
    const t = i18n[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) el.innerHTML = t[key];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      if (t[key] !== undefined) el.placeholder = t[key];
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    setLang('fr');
    // Restore accessible mode preference
    if (localStorage.getItem('portfolioA11y') === '1') {
      document.body.classList.add('accessible');
      document.getElementById('btn-a11y').classList.add('active');
      document.getElementById('btn-a11y').setAttribute('aria-pressed', 'true');
    }
  });

  function toggleAccessible() {
    const isOn = document.body.classList.toggle('accessible');
    const btn = document.getElementById('btn-a11y');
    btn.classList.toggle('active', isOn);
    btn.setAttribute('aria-pressed', isOn ? 'true' : 'false');
    try { localStorage.setItem('portfolioA11y', isOn ? '1' : '0'); } catch(e) {}
  }

  /* ── SCROLL NAVIGATION ── */
  function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  /* ── NAV DOTS SYNC ── */
  const sections = ['page-identity','page-parcours','page-projets','page-formation','page-contact'];
  const dots = document.querySelectorAll('.nav-dot');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const idx = sections.indexOf(entry.target.id);
        dots.forEach((d, i) => d.classList.toggle('active', i === idx));
      }
    });
  }, { threshold: 0.5 });

  document.addEventListener('DOMContentLoaded', () => {
    sections.forEach(id => {
      const el = document.getElementById(id);
      if (el) observer.observe(el);
    });
  });

  /* ── CONTACT MODAL ── */
  function openContactForm() {
    document.getElementById('contactModal').classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeContactForm() {
    document.getElementById('contactModal').classList.remove('active');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeContactForm();
  });
  document.getElementById('contactModal').addEventListener('click', e => {
    if (e.target.id === 'contactModal') closeContactForm();
  });

  function handleSubmit(event) {
    event.preventDefault();
    const btn = document.getElementById('submitBtn');
    const form = event.target;
    btn.disabled = true;
    btn.textContent = currentLang === 'fr' ? 'ENVOI...' : 'SENDING...';
    fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    })
    .then(r => {
      if (r.ok) {
        btn.textContent = currentLang === 'fr' ? '✓ ENVOYÉ' : '✓ SENT';
        form.reset();
        setTimeout(() => { closeContactForm(); btn.disabled = false; btn.textContent = i18n[currentLang].form_send; }, 2000);
      } else throw new Error();
    })
    .catch(() => {
      btn.disabled = false;
      btn.textContent = currentLang === 'fr' ? '✗ ERREUR — RÉESSAYER' : '✗ ERROR — RETRY';
      setTimeout(() => { btn.textContent = i18n[currentLang].form_send; }, 3000);
    });
  }
  </script>
